name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          # - macos-14  # re-enable once macOS build is supported (sherpa-onnx download + rustup setup)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # rust-cache restores target/ (including sherpa-rs-sys's build-script
      # stamp) but the sherpa-onnx download lives in ~/.cache/sherpa-rs/.
      # Without this, the build script skips re-download and the link fails
      # with "unable to find library -lonnxruntime".
      - name: cache sherpa-onnx download
        uses: actions/cache@v4
        with:
          path: ~/.cache/sherpa-rs
          key: sherpa-rs-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            sherpa-rs-${{ runner.os }}-
      # If the sherpa-onnx download is missing (cache miss or stale rust-cache
      # restored a target/ with the build-script stamp but no libs), force the
      # sherpa-rs-sys build script to re-run by cleaning that crate's outputs.
      - name: ensure sherpa-rs-sys rebuilds when libs are missing
        run: |
          if ! find ~/.cache/sherpa-rs -name 'libonnxruntime*' 2>/dev/null | grep -q .; then
            echo "sherpa-onnx libs missing; cleaning sherpa-rs-sys to force re-download"
            cargo clean -p sherpa-rs-sys || true
          else
            echo "sherpa-onnx libs present in ~/.cache/sherpa-rs"
          fi
      - name: install linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libdbus-1-dev libxcb1-dev
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          # - macos-14  # re-enable once macOS build is supported (sherpa-onnx download + rustup setup)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cache sherpa-onnx download
        uses: actions/cache@v4
        with:
          path: ~/.cache/sherpa-rs
          key: sherpa-rs-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            sherpa-rs-${{ runner.os }}-
      # If the sherpa-onnx download is missing (cache miss or stale rust-cache
      # restored a target/ with the build-script stamp but no libs), force the
      # sherpa-rs-sys build script to re-run by cleaning that crate's outputs.
      - name: ensure sherpa-rs-sys rebuilds when libs are missing
        run: |
          if ! find ~/.cache/sherpa-rs -name 'libonnxruntime*' 2>/dev/null | grep -q .; then
            echo "sherpa-onnx libs missing; cleaning sherpa-rs-sys to force re-download"
            cargo clean -p sherpa-rs-sys || true
          else
            echo "sherpa-onnx libs present in ~/.cache/sherpa-rs"
          fi
      - name: install linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libdbus-1-dev libxcb1-dev
      - name: install nextest
        uses: taiki-e/install-action@nextest
      # sherpa-rs-sys's build script copies libsherpa-onnx-c-api.so into
      # target/<profile>/ so the binary's $ORIGIN rpath finds it. On a
      # cache-hit build the script doesn't re-run, the .so isn't copied,
      # and integration tests that exec the binary fail with "cannot open
      # shared object file". Export LD_LIBRARY_PATH from the cached
      # sherpa-rs download dir as a fallback.
      - name: export sherpa-onnx LD_LIBRARY_PATH
        run: |
          SHERPA_LIB=$(find ~/.cache/sherpa-rs -name 'libsherpa-onnx-c-api.so' -exec dirname {} \; | head -1)
          if [ -n "$SHERPA_LIB" ]; then
            echo "LD_LIBRARY_PATH=$SHERPA_LIB${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
            echo "exported LD_LIBRARY_PATH=$SHERPA_LIB"
          else
            echo "warning: no libsherpa-onnx-c-api.so found in ~/.cache/sherpa-rs"
          fi
      - run: cargo nextest run
      - run: cargo test --doc

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
