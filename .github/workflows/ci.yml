name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          # - macos-14  # re-enable once macOS build is supported (sherpa-onnx download + rustup setup)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # rust-cache restores target/ (including sherpa-rs-sys's build-script
      # stamp) but the sherpa-onnx download lives in ~/.cache/sherpa-rs/.
      # Without this, the build script skips re-download and the link fails
      # with "unable to find library -lonnxruntime".
      - name: cache sherpa-onnx download
        uses: actions/cache@v4
        with:
          path: ~/.cache/sherpa-rs
          key: sherpa-rs-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            sherpa-rs-${{ runner.os }}-
      - name: install linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libdbus-1-dev libxcb1-dev
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          # - macos-14  # re-enable once macOS build is supported (sherpa-onnx download + rustup setup)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cache sherpa-onnx download
        uses: actions/cache@v4
        with:
          path: ~/.cache/sherpa-rs
          key: sherpa-rs-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            sherpa-rs-${{ runner.os }}-
      - name: install linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libdbus-1-dev libxcb1-dev
      - name: install nextest
        uses: taiki-e/install-action@nextest
      - run: cargo nextest run
      - run: cargo test --doc

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
