name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
      - name: install linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libdbus-1-dev libxcb1-dev
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
      # sherpa-onnx-sys's build script downloads prebuilt native libs into
      # target/<profile>/sherpa-onnx-prebuilt/. rust-cache covers that path.
      # Daemon `run` fetches the streaming Nemotron bundle on startup
      # (~442MB int8). Cache the model dir so the daemon_lifecycle integration
      # test reuses the download across runs. Key on the bundle name so a
      # future model bump invalidates the cache.
      - name: cache scribed ASR model
        uses: actions/cache@v4
        with:
          path: ~/.cache/scribed
          key: scribed-model-${{ runner.os }}-sherpa-onnx-nemotron-speech-streaming-en-0.6b-1120ms-int8-2026-04-25
          restore-keys: |
            scribed-model-${{ runner.os }}-
      - name: install linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libdbus-1-dev libxcb1-dev
      - name: install nextest
        uses: taiki-e/install-action@nextest
      # Pre-fetch the ASR model so the daemon_lifecycle integration test
      # doesn't time out waiting for the ~442MB download. On cache hit this
      # is a few-ms no-op; on cache miss it primes the cache for future runs.
      - run: cargo run --release --bin scribed -- fetch-model
      - run: cargo nextest run
      - run: cargo test --doc

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
