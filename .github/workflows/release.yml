name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: install linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libdbus-1-dev
      - run: cargo build --release --target ${{ matrix.target }}
      - name: package
        shell: bash
        run: |
          mkdir -p dist staging
          release_dir="target/${{ matrix.target }}/release"
          cp "$release_dir/scribed" staging/
          # Ship sherpa-onnx native libs next to the binary; $ORIGIN rpath finds them.
          find "$release_dir" -maxdepth 1 \( -name '*.so' -o -name '*.so.*' -o -name '*.dylib' \) -exec cp -P {} staging/ \;
          archive="scribed-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar czf "dist/$archive" -C staging .
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
