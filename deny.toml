# cargo-deny configuration.
# Run: cargo deny check

[graph]
all-features = false
no-default-features = false

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[advisories]
version = 2
ignore = [
    # number_prefix is unmaintained; pulled in transitively via indicatif. No safe upgrade
    # available — wait for upstream indicatif to switch to unit-prefix.
    "RUSTSEC-2025-0119",
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
